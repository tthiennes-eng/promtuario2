name: promt
description: "Sistema de Gerenciamento para Clínica Escola Odontológica Universitária."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # Local Database
  drift: ^2.16.0
  sqlite3_flutter_libs: ^0.5.20

  # Network
  dio: ^5.4.1
  signalr_netcore: ^1.3.5

  # Security & Storage
  flutter_secure_storage: ^9.0.0

  # Modeling
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Utils
  intl: any
  path_provider: ^2.1.2
  path: ^1.9.0
  uuid: ^4.3.3
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  
  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.11
  drift_dev: ^2.16.0
  freezed: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true
